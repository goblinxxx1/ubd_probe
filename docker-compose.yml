services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ubd
    volumes:
      - ubd-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    # NOTE: 3306 intentionally NOT published (clashes with external mysql-container)

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/ubd
      JWT_SECRET: ${JWT_SECRET}
      CRAWLER_API_KEY: ${CRAWLER_API_KEY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  public:
    build: ./public
    depends_on:
      - backend
    ports:
      - "${PUBLIC_PORT:-8080}:80"

  admin:
    build: ./admin
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-8082}:80"

  fixture:
    image: nginx:alpine
    profiles: ["crawler"]
    volumes:
      - ./docker/fixture:/usr/share/nginx/html:ro

  searxng:
    image: searxng/searxng:latest
    profiles: ["crawler"]
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-changeme-searxng-secret-please-rotate}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  crawler:
    build: ./crawler
    profiles: ["crawler"]
    # Load search config (SEARCH_KEYWORDS / SEARCH_PROVIDERS / limits, bot accounts,
    # EXTRACTOR, ACTIVE_DISCOVERY) from crawler/.env if present. Optional: absence
    # doesn't break the offline demo (falls back to image defaults). The environment
    # block below overrides the few Docker-network values. Per-run flags (-e) win over both.
    env_file:
      - path: crawler/.env
        required: false
    depends_on:
      backend:
        condition: service_started
      fixture:
        condition: service_started
      searxng:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://backend:8000
      CRAWLER_API_KEY: ${CRAWLER_API_KEY}
      EXTRACTOR: heuristic
      SEARXNG_URL: http://searxng:8080
      CRAWL_INTERVAL_SECONDS: ${CRAWL_INTERVAL_SECONDS:-0}

volumes:
  ubd-db-data:
