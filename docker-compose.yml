services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ubd
    volumes:
      - ubd-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    # NOTE: 3306 intentionally NOT published (clashes with external mysql-container)

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/ubd
      JWT_SECRET: ${JWT_SECRET}
      CRAWLER_API_KEY: ${CRAWLER_API_KEY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  public:
    build: ./public
    depends_on:
      - backend
    ports:
      - "${PUBLIC_PORT:-8080}:80"

  admin:
    build: ./admin
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-8082}:80"

volumes:
  ubd-db-data:
