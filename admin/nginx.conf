server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Resolve the backend hostname per-request via Docker's embedded DNS,
        # so a backend container rebuild (new IP) doesn't leave nginx on a stale
        # address (which caused 502 until a manual restart).
        resolver 127.0.0.11 valid=10s;
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
